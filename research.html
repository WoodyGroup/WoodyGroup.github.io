<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research — ADIL @ CMU</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .research-area {
      padding: 40px 0;
      border-bottom: 1px solid var(--border);
    }
    .research-area:last-child { border-bottom: none; }

    .area-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }
    .area-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      background: rgba(196,18,48,0.08);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .area-header h3 {
      font-size: 1.2rem;
      color: var(--dark);
    }

    .area-desc {
      font-family: 'Arial', sans-serif;
      font-size: 0.9rem;
      color: var(--gray);
      line-height: 1.65;
      max-width: 700px;
      margin-bottom: 14px;
    }

    .area-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 22px; }

    /* Paper list under each area */
    .area-papers { list-style: none; margin-top: 4px; }

    .area-paper-item { padding: 12px 0; }

    .area-paper-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
    }
    .area-paper-title {
      font-size: 0.93rem;
      color: var(--dark);
    }
    .area-paper-title-link {
      font-size: 0.93rem;
      color: var(--dark);
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      transition: color 0.15s, border-color 0.15s;
    }
    .area-paper-title-link:hover {
      color: var(--red);
      border-bottom-color: var(--red);
    }
    .area-paper-authors {
      font-family: 'Arial', sans-serif;
      font-size: 0.82rem;
      color: #777;
      display: block;
    }
    .area-paper-award {
      font-family: 'Arial', sans-serif;
      font-size: 0.78rem;
      color: #b8860b;
      margin-top: 2px;
    }
    .area-paper-award::before { content: "🏆 "; font-size: 0.72rem; }
    .area-paper-links { display: inline-flex; gap: 5px; vertical-align: middle; }
    .area-paper-tag {
      font-family: 'Arial', sans-serif;
      font-size: 0.7rem;
      padding: 1px 8px;
      border-radius: 20px;
      border: 1px solid #ccc;
      color: #555;
      text-decoration: none;
      transition: all 0.15s;
    }
    .area-paper-tag:hover { border-color: var(--red); color: var(--red); text-decoration: none; }

    .papers-label {
      font-family: 'Arial', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: #999;
      margin-bottom: 4px;
    }

    .area-paper-extra { display: none; }
    .area-paper-extra.visible { display: list-item; }

    .expand-btn {
      font-family: 'Arial', sans-serif;
      font-size: 0.82rem;
      color: var(--red);
      background: none;
      border: none;
      padding: 8px 0 0;
      cursor: pointer;
      display: block;
    }
    .expand-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav id="main-nav"></nav>
<script src="assets/js/nav.js"></script>

<div class="page-hero">
  <div class="container">
    <p class="eyebrow">What we do</p>
    <h1>Research</h1>
    <p>We build principled methods at the intersection of machine learning, optimization, and real-world decision-making.</p>
  </div>
</div>

<section class="pad">
  <div class="container" id="research-root">
    <!-- rendered by JS -->
  </div>
</section>

<footer>
  <div class="footer-name">Adaptive Decision Intelligence Lab</div>
  <p>Carnegie Mellon University &nbsp;&bull;&nbsp;
    <a href="https://www.andrew.cmu.edu/user/shixianz/" target="_blank" rel="noopener">Shixiang (Woody) Zhu</a>
  </p>
</footer>

<script src="data/publications.js"></script>
<script>
  /* ── Research area definitions ──────────────────────────────────────
   * categories: which PUBLICATIONS category keys count for this area.
   * icon, title, description, tags: static display content.
   * ------------------------------------------------------------------ */
  const AREAS = [
    {
      id: "decision-learning",
      icon: "🎯",
      title: "Decision-Focused Learning",
      description: "Traditional ML pipelines separate prediction from optimization. We integrate learned models directly into optimization loops, training representations that minimize downstream decision regret rather than prediction error alone. Our methods address non-differentiable optimization layers, combinatorial action spaces, and distribution shift between training and deployment.",
      tags: ["Predict-then-Optimize", "Task-Based Learning", "End-to-End Differentiable Optimization"],
      categories: ["decision-learning"]
    },
    {
      id: "conformal-robust",
      icon: "📐",
      title: "Conformal Prediction & Robust Optimization",
      description: "We develop conformal prediction methods that produce distribution-free, statistically rigorous uncertainty sets and connect them directly to downstream optimization. We also build robust and distributionally robust optimization frameworks with data-driven ambiguity sets — with applications to risk assessment, reliable ML deployment, and decision-making under uncertainty.",
      tags: ["Conformal Prediction", "Uncertainty Quantification", "Robust Optimization", "Risk Control"],
      categories: ["conformal-prediction", "robust-optimization"]
    },
    {
      id: "energy-resilience",
      icon: "⚡",
      title: "Energy Systems Resilience",
      description: "Power grids face growing uncertainty from renewable variability, extreme weather, and evolving demand. We apply data-driven optimization and ML to grid planning, demand forecasting, and resilience under stress — with direct partnerships with utilities and real-world deployment.",
      tags: ["Power Grid Optimization", "Demand Forecasting", "Infrastructure Resilience", "Electricity Markets"],
      categories: ["energy-resilience"]
    },
    {
      id: "generative-models",
      icon: "🎲",
      title: "Generative & Probabilistic Models",
      description: "We build generative models for structured and sequential data — including temporal point processes, tabular time series, and counterfactual distributions. Our focus is on models that are not only statistically well-calibrated but also useful for downstream decision-making and policy evaluation.",
      tags: ["Generative Models", "Temporal Point Processes", "Synthetic Data", "Counterfactual Modeling"],
      categories: ["generative-models", "spatio-temporal"]
    },
    {
      id: "change-detection",
      icon: "📈",
      title: "Change Point Detection",
      description: "Many critical systems require real-time monitoring and rapid detection of anomalies or structural changes. We develop change-point detection, goodness-of-fit testing, and anomaly detection methods grounded in modern machine learning — with applications to grid monitoring, public health, and event data.",
      tags: ["Change-Point Detection", "Anomaly Detection", "Score-Based Methods", "Goodness-of-Fit Testing"],
      categories: ["change-detection"]
    },
    {
      id: "fairness-policy",
      icon: "⚖️",
      title: "Fairness, Causality & Policy",
      description: "Deploying AI in high-stakes settings requires more than accuracy. We study causal inference for counterfactual fairness, human-AI collaboration, and optimization under implicit societal constraints — with applications to healthcare, energy equity, and public policy.",
      tags: ["Counterfactual Fairness", "Causal Inference", "Human-AI Collaboration", "Policy Optimization"],
      categories: ["fairness-causality", "human-ai"]
    }
  ];

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* Collect all papers across all sections into a flat list, preserving order */
  function allPapers() {
    const out = [];
    PUBLICATIONS.sections.forEach(sec => {
      sec.papers.forEach(p => out.push(p));
    });
    return out;
  }

  const papers = allPapers();
  const root = document.getElementById('research-root');

  AREAS.forEach(area => {
    const matching = papers.filter(p =>
      p.categories && p.categories.some(c => area.categories.includes(c))
    );

    const div = document.createElement('div');
    div.className = 'research-area';
    div.id = area.id;

    // Header
    let html = `
      <div class="area-header">
        <div class="area-icon">${area.icon}</div>
        <h3>${esc(area.title)}</h3>
      </div>
      <p class="area-desc">${esc(area.description)}</p>
      <div class="area-tags">
        ${area.tags.map(t => `<span class="tag-pill">${esc(t)}</span>`).join('')}
      </div>`;

    // Papers
    const PREVIEW = 4;
    if (matching.length > 0) {
      html += `<p class="papers-label">Papers</p><ul class="area-papers">`;
      matching.forEach((p, idx) => {
        const firstLink = p.links && p.links.length ? p.links[0] : null;
        const titleHtml = firstLink
          ? `<a class="area-paper-title-link" href="${esc(firstLink.url)}" target="_blank" rel="noopener">${esc(p.title)}</a>`
          : `<span class="area-paper-title">${esc(p.title)}</span>`;
        const extraLinks = (p.links || []).slice(1).map(l =>
          `<a class="area-paper-tag" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`
        ).join('');
        const awardHtml = (p.awards || []).map(a =>
          `<div class="area-paper-award">${esc(a)}</div>`
        ).join('');
        const extraClass = idx >= PREVIEW ? ' area-paper-extra' : '';
        html += `
          <li class="area-paper-item${extraClass}">
            <div class="area-paper-title-row">${titleHtml}${extraLinks ? `<span class="area-paper-links">${extraLinks}</span>` : ''}</div>
            <div class="area-paper-authors">${esc(p.authors)}</div>
            ${awardHtml}
          </li>`;
      });
      html += `</ul>`;
      if (matching.length > PREVIEW) {
        const id = 'expand-' + area.id;
        html += `<button class="expand-btn" id="${id}" onclick="togglePapers('${area.id}', ${matching.length})">Show all ${matching.length} papers ▾</button>`;
      }
    }

    div.innerHTML = html;
    root.appendChild(div);
  });

  /* Scroll to fragment after JS renders sections */
  if (window.location.hash) {
    const el = document.querySelector(window.location.hash);
    if (el) {
      const navH = 72;
      window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - navH, behavior: 'auto' });
    }
  }

  function togglePapers(areaId, total) {
    const section = document.getElementById(areaId);
    const extras = section.querySelectorAll('.area-paper-extra');
    const btn = document.getElementById('expand-' + areaId);
    const expanded = extras[0] && extras[0].classList.contains('visible');
    extras.forEach(el => el.classList.toggle('visible', !expanded));
    btn.textContent = expanded ? `Show all ${total} papers ▾` : `Show fewer ▴`;
  }
</script>

</body>
</html>
