<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research — ADIL @ CMU</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .research-area {
      padding: 40px 0;
      border-bottom: 1px solid var(--border);
    }
    .research-area:last-child { border-bottom: none; }

    .area-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }
    .area-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      background: rgba(196,18,48,0.08);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .area-header h3 {
      font-size: 1.2rem;
      color: var(--dark);
    }

    .area-desc {
      font-family: 'Arial', sans-serif;
      font-size: 0.9rem;
      color: var(--gray);
      line-height: 1.65;
      max-width: 700px;
      margin-bottom: 14px;
    }

    .area-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 22px; }

    /* Paper list under each area */
    .area-papers { list-style: none; margin-top: 4px; }

    .area-paper-item { padding: 12px 0; }

    .area-paper-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
    }
    .area-paper-title {
      font-size: 0.93rem;
      color: var(--dark);
    }
    .area-paper-title-link {
      font-size: 0.93rem;
      color: var(--dark);
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      transition: color 0.15s, border-color 0.15s;
    }
    .area-paper-title-link:hover {
      color: var(--red);
      border-bottom-color: var(--red);
    }
    .area-paper-authors {
      font-family: 'Arial', sans-serif;
      font-size: 0.82rem;
      color: #777;
      display: block;
    }
    .area-paper-award {
      font-family: 'Arial', sans-serif;
      font-size: 0.78rem;
      color: #b8860b;
      margin-top: 2px;
    }
    .area-paper-award::before { content: "🏆 "; font-size: 0.72rem; }
    .area-paper-links { display: inline-flex; gap: 5px; vertical-align: middle; }
    .area-paper-tag {
      font-family: 'Arial', sans-serif;
      font-size: 0.7rem;
      padding: 1px 8px;
      border-radius: 20px;
      border: 1px solid #ccc;
      color: #555;
      text-decoration: none;
      transition: all 0.15s;
    }
    .area-paper-tag:hover { border-color: var(--red); color: var(--red); text-decoration: none; }

    .papers-label {
      font-family: 'Arial', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: #999;
      margin-bottom: 4px;
    }

    .area-paper-extra { display: none; }
    .area-paper-extra.visible { display: list-item; }

    .expand-btn {
      font-family: 'Arial', sans-serif;
      font-size: 0.82rem;
      color: var(--red);
      background: none;
      border: none;
      padding: 8px 0 0;
      cursor: pointer;
      display: block;
    }
    .expand-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav id="main-nav"></nav>
<script src="assets/js/nav.js"></script>

<div class="page-hero">
  <div class="container">
    <p class="eyebrow">What we do</p>
    <h1>Research</h1>
    <p>We build principled methods at the intersection of machine learning, optimization, and real-world decision-making.</p>
  </div>
</div>

<section class="pad">
  <div class="container" id="research-root">
    <!-- rendered by JS -->
  </div>
</section>

<footer>
  <div class="footer-name">Adaptive Decision Intelligence Lab</div>
  <p>Carnegie Mellon University &nbsp;&bull;&nbsp;
    <a href="https://www.andrew.cmu.edu/user/shixianz/" target="_blank" rel="noopener">Shixiang (Woody) Zhu</a>
  </p>
</footer>

<script src="data/publications.js"></script>
<script>
  /* ── Research area definitions ──────────────────────────────────────
   * categories: which PUBLICATIONS category keys count for this area.
   * icon, title, description, tags: static display content.
   * ------------------------------------------------------------------ */
  const AREAS = [
    {
      id: "decision-aware",
      icon: "🎯",
      title: "Decision-Aware Learning",
      description: "Traditional ML pipelines separate prediction from optimization. We train models whose representations directly minimize downstream decision regret — integrating learned models into optimization loops, addressing non-differentiable solvers and combinatorial action spaces, and connecting conformal uncertainty sets to robust decision objectives.",
      tags: ["Predict-then-Optimize", "Task-Based Learning", "Decision Regret", "End-to-End Optimization"],
      categories: ["decision-aware"]
    },
    {
      id: "conformal-risk",
      icon: "📐",
      title: "Conformal Prediction and Risk Calibration",
      description: "We develop conformal prediction methods that produce distribution-free, statistically rigorous uncertainty sets and coverage guarantees — including vectorized non-conformity scores, hierarchical and topology-aware prediction sets, and inverse conformal risk control. Our work connects uncertainty quantification directly to downstream risk management and safe decision-making.",
      tags: ["Conformal Prediction", "Uncertainty Quantification", "Coverage Guarantees", "Risk Control"],
      categories: ["conformal-risk"]
    },
    {
      id: "energy-resilience",
      icon: "⚡",
      title: "Energy, Infrastructure, and Climate Resilience",
      description: "Power grids face growing stress from wildfire risk, extreme weather, renewable variability, and evolving demand. We apply data-driven optimization and ML to large-scale resilience planning, outage quantification, distributed energy adoption, and equity in electricity access — with direct utility partnerships and real-world deployment.",
      tags: ["Grid Resilience", "Wildfire Risk", "Distributed Energy", "Climate Adaptation", "Infrastructure Planning"],
      categories: ["energy-resilience"]
    },
    {
      id: "spatiotemporal-detection",
      icon: "📈",
      title: "Spatio-Temporal Modeling and Event Detection",
      description: "Many critical systems generate streams of event data with complex spatial and temporal structure. We develop point process models, change-point detection, anomaly detection, and goodness-of-fit tests grounded in modern ML — applied to public health surveillance, power systems monitoring, and emergency response.",
      tags: ["Point Processes", "Change-Point Detection", "Anomaly Detection", "Time Series Testing"],
      categories: ["spatiotemporal-detection"]
    },
    {
      id: "causal-fair",
      icon: "🔍",
      title: "Causal, Counterfactual, and Fair AI",
      description: "We develop causal inference and counterfactual learning methods for understanding treatment effects, modeling time-varying interventions, and ensuring algorithmic fairness. Our work includes counterfactual generative models, data orthogonalization for bias removal, and causal event prediction — with applications to healthcare, platform policy, and energy equity.",
      tags: ["Causal Inference", "Counterfactual Learning", "Algorithmic Fairness", "Treatment Effects"],
      categories: ["causal-fair"]
    },
    {
      id: "human-ai-decisions",
      icon: "⚖️",
      title: "Human-AI and Personalized Decision Support",
      description: "We study how AI systems can augment rather than replace human judgment — including the paradoxes of automation and collaboration, generative curation for diverse decision recommendations, personalized treatment dosing, and optimization under implicit constraints for public policy. Our goal is AI that is useful, trustworthy, and aligned with human preferences.",
      tags: ["Human-AI Collaboration", "Generative Curation", "Personalized Dosing", "Policy Optimization"],
      categories: ["human-ai-decisions"]
    }
  ];

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* Collect all papers across all sections into a flat list, preserving order */
  function allPapers() {
    const out = [];
    PUBLICATIONS.sections.forEach(sec => {
      sec.papers.forEach(p => out.push(p));
    });
    return out;
  }

  const papers = allPapers();
  const root = document.getElementById('research-root');

  AREAS.forEach(area => {
    const matching = papers.filter(p =>
      p.categories && p.categories.some(c => area.categories.includes(c))
    );

    const div = document.createElement('div');
    div.className = 'research-area';
    div.id = area.id;

    // Header
    let html = `
      <div class="area-header">
        <div class="area-icon">${area.icon}</div>
        <h3>${esc(area.title)}</h3>
      </div>
      <p class="area-desc">${esc(area.description)}</p>
      <div class="area-tags">
        ${area.tags.map(t => `<span class="tag-pill">${esc(t)}</span>`).join('')}
      </div>`;

    // Papers
    const PREVIEW = 4;
    if (matching.length > 0) {
      html += `<p class="papers-label">Papers</p><ul class="area-papers">`;
      matching.forEach((p, idx) => {
        const realLinks = (p.links || []).filter(l => l.url && l.url !== '#');
        const PREF = ['arxiv', 'ssrn', 'pdf'];
        const titleLink = realLinks.find(l => PREF.includes(l.label.toLowerCase())) || realLinks[0] || null;
        const titleHtml = titleLink
          ? `<a class="area-paper-title-link" href="${esc(titleLink.url)}" target="_blank" rel="noopener">${esc(p.title)}</a>`
          : `<span class="area-paper-title">${esc(p.title)}</span>`;
        const extraLinks = realLinks.filter(l => l !== titleLink).map(l =>
          `<a class="area-paper-tag" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`
        ).join('');
        const awardHtml = (p.awards || []).map(a =>
          `<div class="area-paper-award">${esc(a)}</div>`
        ).join('');
        const extraClass = idx >= PREVIEW ? ' area-paper-extra' : '';
        html += `
          <li class="area-paper-item${extraClass}">
            <div class="area-paper-title-row">${titleHtml}${extraLinks ? `<span class="area-paper-links">${extraLinks}</span>` : ''}</div>
            <div class="area-paper-authors">${esc(p.authors)}</div>
            ${awardHtml}
          </li>`;
      });
      html += `</ul>`;
      if (matching.length > PREVIEW) {
        const id = 'expand-' + area.id;
        html += `<button class="expand-btn" id="${id}" onclick="togglePapers('${area.id}', ${matching.length})">Show all ${matching.length} papers ▾</button>`;
      }
    }

    div.innerHTML = html;
    root.appendChild(div);
  });

  /* Scroll to fragment after JS renders sections */
  if (window.location.hash) {
    const el = document.querySelector(window.location.hash);
    if (el) {
      const navH = 72;
      window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - navH, behavior: 'auto' });
    }
  }

  function togglePapers(areaId, total) {
    const section = document.getElementById(areaId);
    const extras = section.querySelectorAll('.area-paper-extra');
    const btn = document.getElementById('expand-' + areaId);
    const expanded = extras[0] && extras[0].classList.contains('visible');
    extras.forEach(el => el.classList.toggle('visible', !expanded));
    btn.textContent = expanded ? `Show all ${total} papers ▾` : `Show fewer ▴`;
  }
</script>

</body>
</html>
