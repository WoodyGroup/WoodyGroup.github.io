<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publications — ADIL @ CMU</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .year-header {
      font-family: 'Arial', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark);
      border-bottom: 2px solid var(--red);
      padding-bottom: 8px;
      margin: 52px 0 6px;
    }
    .year-header:first-child { margin-top: 0; }

    .pub-list  { list-style: none; }

    .pub-item {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }

    .pub-title {
      font-size: 1rem;
      color: var(--dark);
      margin-bottom: 3px;
    }

    .pub-authors {
      font-family: 'Arial', sans-serif;
      font-size: 0.86rem;
      color: var(--gray);
      margin-bottom: 2px;
    }

    .pub-venue {
      font-family: 'Arial', sans-serif;
      font-size: 0.84rem;
      color: #777;
      font-style: italic;
      margin-bottom: 2px;
    }

    .pub-links {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .pub-tag {
      font-family: 'Arial', sans-serif;
      font-size: 0.73rem;
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      color: #555;
      text-decoration: none;
      transition: all 0.15s;
    }
    .pub-tag:hover { border-color: var(--red); color: var(--red); text-decoration: none; }
    .pub-tag.pdf   { background: var(--red); border-color: var(--red); color: #fff; }
    .pub-tag.pdf:hover { background: #a30f28; }

    .pub-note {
      font-family: 'Arial', sans-serif;
      font-size: 0.82rem;
      color: #888;
      margin-top: 5px;
    }

    .pub-award {
      font-family: 'Arial', sans-serif;
      font-size: 0.82rem;
      color: #b8860b;
      margin-top: 4px;
    }
    .pub-award::before { content: "🏆 "; font-size: 0.75rem; }

    #pub-root .loading {
      font-family: 'Arial', sans-serif;
      color: #999;
      padding: 40px 0;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">ADIL <span>@ CMU</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="people.html">People</a></li>
    <li><a href="research.html">Research</a></li>
    <li><a href="publications.html" class="active">Publications</a></li>
  </ul>
</nav>

<div class="page-hero">
  <div class="container">
    <p class="eyebrow">Selected works</p>
    <h1>Publications</h1>
    <p>Papers from the lab. Also see
      <a href="https://scholar.google.com/citations?hl=en&user=f8xblKQAAAAJ&view_op=list_works&sortby=pubdate"
         target="_blank" rel="noopener" style="color:var(--accent);">Google Scholar</a>.
    </p>
  </div>
</div>

<section class="pad">
  <div class="container">
    <div id="pub-root"><p class="loading">Loading…</p></div>
  </div>
</section>

<footer>
  <div class="footer-name">Adaptive Decision Intelligence Lab</div>
  <p>Carnegie Mellon University &nbsp;&bull;&nbsp;
    <a href="https://www.andrew.cmu.edu/user/shixianz/" target="_blank" rel="noopener">Shixiang (Woody) Zhu</a>
  </p>
</footer>

<script src="data/publications.js"></script>
<script>
  function esc(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function render() {
    const root = document.getElementById('pub-root');
    root.innerHTML = '';

    PUBLICATIONS.sections.forEach((section, si) => {
      const h = document.createElement('h2');
      h.className = 'year-header';
      h.textContent = section.label;
      root.appendChild(h);

      const ul = document.createElement('ul');
      ul.className = 'pub-list';

      section.papers.forEach(p => {
        const li = document.createElement('li');
        li.className = 'pub-item';

        let html = `<div class="pub-title">${esc(p.title)}</div>`;
        html += `<div class="pub-authors">${esc(p.authors)}</div>`;
        if (p.venue) html += `<div class="pub-venue">${esc(p.venue)}</div>`;

        if (p.links && p.links.length) {
          html += '<div class="pub-links">';
          p.links.forEach(l => {
            const cls = l.label === 'PDF' ? 'pub-tag pdf' : 'pub-tag';
            html += `<a class="${cls}" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`;
          });
          html += '</div>';
        }

        (p.notes  || []).forEach(n => { html += `<div class="pub-note">${esc(n)}</div>`; });
        (p.awards || []).forEach(a => { html += `<div class="pub-award">${esc(a)}</div>`; });

        li.innerHTML = html;
        ul.appendChild(li);
      });

      root.appendChild(ul);
    });
  }

  render();
</script>

</body>
</html>
