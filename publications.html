<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publications — ADIL @ CMU</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .year-header {
      font-family: 'Arial', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark);
      border-bottom: 2px solid var(--red);
      padding-bottom: 8px;
      margin: 52px 0 6px;
    }
    .year-header:first-child { margin-top: 0; }

    .pub-list { list-style: none; }

    .pub-item { padding: 12px 0; display: block; border-bottom: 1px solid var(--border); }

    .pub-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
    }
    .pub-title {
      font-size: 0.95rem;
      color: var(--dark);
    }
    .pub-title-link {
      font-size: 0.95rem;
      color: var(--dark);
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      transition: color 0.15s, border-color 0.15s;
    }
    .pub-title-link:hover { color: var(--red); border-bottom-color: var(--red); }

    .pub-links { display: inline-flex; gap: 5px; }
    .pub-tag {
      font-family: 'Arial', sans-serif;
      font-size: 0.7rem;
      padding: 1px 8px;
      border-radius: 20px;
      border: 1px solid #ccc;
      color: #555;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .pub-tag:hover { border-color: var(--red); color: var(--red); text-decoration: none; }
    .pub-tag.pdf   { background: var(--red); border-color: var(--red); color: #fff; }
    .pub-tag.pdf:hover { background: #a30f28; }

    .pub-authors {
      display: block;
      font-family: 'Arial', sans-serif;
      font-size: 0.82rem;
      color: #777;
    }
    .pub-venue {
      display: block;
      font-family: 'Arial', sans-serif;
      font-size: 0.82rem;
      color: #888;
      font-style: italic;
    }
    .pub-award {
      display: block;
      font-family: 'Arial', sans-serif;
      font-size: 0.78rem;
      color: #b8860b;
      margin-top: 2px;
    }
    .pub-award::before { content: "🏆 "; font-size: 0.72rem; }
    .pub-note {
      display: block;
      font-family: 'Arial', sans-serif;
      font-size: 0.78rem;
      color: #888;
      margin-top: 2px;
    }

    #pub-root .loading {
      font-family: 'Arial', sans-serif;
      color: #999;
      padding: 40px 0;
    }
  </style>
</head>
<body>

<nav id="main-nav"></nav>
<script src="assets/js/nav.js"></script>

<div class="page-hero">
  <div class="container">
    <p class="eyebrow">Selected works</p>
    <h1>Publications</h1>
    <p>Also see
      <a href="https://scholar.google.com/citations?user=v6_Gv6IAAAAJ&hl=en"
         target="_blank" rel="noopener" style="color:var(--accent);">Google Scholar</a>.
    </p>
  </div>
</div>

<section class="pad">
  <div class="container">
    <div id="pub-root"><p class="loading">Loading…</p></div>
  </div>
</section>

<footer>
  <div class="footer-name">Adaptive Decision Intelligence Lab</div>
  <p>Carnegie Mellon University &nbsp;&bull;&nbsp;
    <a href="https://www.andrew.cmu.edu/user/shixianz/" target="_blank" rel="noopener">Shixiang (Woody) Zhu</a>
  </p>
</footer>

<script src="data/publications.js"></script>
<script>
  function esc(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function render() {
    const root = document.getElementById('pub-root');
    root.innerHTML = '';

    PUBLICATIONS.sections.forEach((section, si) => {
      const h = document.createElement('h2');
      h.className = 'year-header';
      h.textContent = section.label;
      root.appendChild(h);

      const ul = document.createElement('ul');
      ul.className = 'pub-list';

      section.papers.forEach(p => {
        const li = document.createElement('li');
        li.className = 'pub-item';

        const realLinks = (p.links || []).filter(l => l.url && l.url !== '#');
        const firstLink = realLinks.length ? realLinks[0] : null;
        const titleHtml = firstLink
          ? `<a class="pub-title-link" href="${esc(firstLink.url)}" target="_blank" rel="noopener">${esc(p.title)}</a>`
          : `<span class="pub-title">${esc(p.title)}</span>`;
        const extraLinks = realLinks.slice(1).map(l => {
          const cls = l.label === 'PDF' ? 'pub-tag pdf' : 'pub-tag';
          return `<a class="${cls}" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`;
        }).join('');

        let html = `<div class="pub-title-row">
          ${titleHtml}
          ${extraLinks ? `<span class="pub-links">${extraLinks}</span>` : ''}
        </div>`;
        html += `<div class="pub-authors">${esc(p.authors)}</div>`;
        if (p.venue) html += `<div class="pub-venue">${esc(p.venue)}</div>`;
        (p.awards || []).forEach(a => { html += `<div class="pub-award">${esc(a)}</div>`; });
        (p.notes  || []).forEach(n => { html += `<div class="pub-note">${esc(n)}</div>`; });

        li.innerHTML = html;
        ul.appendChild(li);
      });

      root.appendChild(ul);
    });
  }

  render();
</script>

</body>
</html>
