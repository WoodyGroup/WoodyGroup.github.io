<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People — ADIL @ CMU</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .member-row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 36px;
      align-items: start;
      padding: 36px 0;
      border-bottom: 1px solid var(--border);
    }
    .member-row:last-child { border-bottom: none; }

    .member-avatar {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-family: 'Georgia', serif;
      font-style: italic;
      color: rgba(255,255,255,0.65);
      background: linear-gradient(135deg, var(--dark) 0%, #3d2b6e 100%);
    }
    .member-row.faculty .member-avatar {
      background: linear-gradient(135deg, var(--red) 0%, #7d0c1e 100%);
    }

    .member-info h2 {
      font-size: 1.35rem;
      font-weight: normal;
      color: var(--dark);
      margin-bottom: 3px;
    }
    .member-info h3 {
      font-size: 1.1rem;
      font-weight: normal;
      color: var(--dark);
      margin-bottom: 3px;
    }
    .member-role {
      font-family: 'Arial', sans-serif;
      font-size: 0.82rem;
      color: var(--red);
      font-weight: 600;
      margin-bottom: 12px;
    }
    .member-row.faculty .member-role {
      color: var(--gray);
      font-weight: 400;
    }
    .member-info p {
      font-family: 'Arial', sans-serif;
      font-size: 0.9rem;
      color: var(--gray);
      line-height: 1.65;
      max-width: 580px;
      margin-bottom: 10px;
    }
    .member-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

    .section-divider {
      font-family: 'Arial', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--dark);
      border-left: 3px solid var(--red);
      padding-left: 10px;
      margin: 52px 0 0;
    }

    @media (max-width: 600px) {
      .member-row { grid-template-columns: 1fr; gap: 16px; }
      .member-avatar { width: 90px; height: 90px; font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<nav id="main-nav"></nav>
<script src="assets/js/nav.js"></script>

<div class="page-hero">
  <div class="container">
    <p class="eyebrow">The team</p>
    <h1>People</h1>
    <p>Faculty, students, and collaborators driving our research forward.</p>
  </div>
</div>

<section class="pad">
  <div class="container" id="people-root">
    <!-- rendered by JS -->
  </div>
</section>

<footer>
  <div class="footer-name">Adaptive Decision Intelligence Lab</div>
  <p>Carnegie Mellon University &nbsp;&bull;&nbsp;
    <a href="https://www.andrew.cmu.edu/user/shixianz/" target="_blank" rel="noopener">Shixiang (Woody) Zhu</a>
  </p>
</footer>

<script src="data/people.js"></script>
<script>
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderSection(people, label, cssClass) {
    if (!people || people.length === 0) return;
    const root = document.getElementById('people-root');

    const divider = document.createElement('div');
    divider.className = 'section-divider';
    divider.textContent = label;
    root.appendChild(divider);

    people.forEach(person => {
      const row = document.createElement('div');
      row.className = `member-row ${cssClass}`;

      const isPrimary = cssClass === 'faculty';
      const nameTag = isPrimary ? 'h2' : 'h3';

      const linkBtns = (person.links || []).map(l =>
        `<a class="btn btn-outline" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`
      ).join('');

      const bioHtml = person.bio
        ? `<p>${esc(person.bio)}</p>`
        : '';

      row.innerHTML = `
        <div class="member-avatar">${esc(person.initials)}</div>
        <div class="member-info">
          <${nameTag}>${esc(person.name)}</${nameTag}>
          <div class="member-role">${esc(person.role)}</div>
          ${bioHtml}
          <div class="member-links">${linkBtns}</div>
        </div>`;

      root.appendChild(row);
    });
  }

  renderSection(PEOPLE.faculty,      'Faculty',               'faculty');
  renderSection(PEOPLE.postdocs,     'Postdoctoral Researchers', 'postdoc');
  renderSection(PEOPLE.phd_students, 'PhD Students',          'phd');
  renderSection(PEOPLE.alumni,       'Alumni',                'alumni');
</script>

</body>
</html>
